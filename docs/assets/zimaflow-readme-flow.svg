<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="360" viewBox="0 0 1180 360" role="img" aria-labelledby="title desc">
  <title id="title">zimaflow v0.1 轻工作流概览</title>
  <desc id="desc">从需求入口经过 sdd-router、brief 或 PRD、轻量实现或 OpenSpec 完整模式、verify review，最终进入 close、handover 和 learn 的主链路。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="55%" stop-color="#0d1728"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7d575"/>
      <stop offset="100%" stop-color="#d99a28"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="soft-shadow" x="-15%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#d6e4ff"/>
    </marker>
    <style>
      .title { font: 700 30px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f8fafc; }
      .subtitle { font: 500 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #b8c7dc; }
      .box-title { font: 700 21px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f8fafc; }
      .box-text { font: 500 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #cbd5e1; }
      .tag { font: 700 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #07111f; }
      .hint { font: 600 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f7d575; }
      .connector { stroke: #d6e4ff; stroke-width: 2.5; fill: none; marker-end: url(#arrow); opacity: 0.9; }
      .loop { stroke: #f7d575; stroke-width: 2; stroke-dasharray: 6 8; fill: none; marker-end: url(#arrow); opacity: 0.78; }
    </style>
  </defs>

  <rect width="1180" height="360" rx="28" fill="url(#bg)"/>
  <path d="M38 58 C210 18, 360 32, 520 58 S870 92, 1142 46" stroke="#1e3a5f" stroke-width="1.5" fill="none" opacity="0.65"/>
  <path d="M44 303 C260 337, 510 325, 698 301 S982 267, 1138 311" stroke="#1e3a5f" stroke-width="1.5" fill="none" opacity="0.65"/>

  <text x="50" y="58" class="title">zimaflow v0.1 轻工作流概览</text>
  <text x="50" y="86" class="subtitle">用最少的约束，把一句需求整理成可追踪、可交接、可收口的实现闭环。</text>

  <g filter="url(#soft-shadow)">
    <rect x="50" y="132" width="142" height="104" rx="14" fill="#0b1628" stroke="#f7d575" stroke-width="1.5"/>
    <circle cx="78" cy="160" r="16" fill="url(#gold)"/>
    <text x="72" y="166" class="tag">1</text>
    <text x="106" y="162" class="box-title">需求入口</text>
    <text x="74" y="195" class="box-text">一句粗略需求</text>
    <text x="74" y="218" class="box-text">或问题线索</text>
  </g>

  <path d="M196 184 H254" class="connector"/>

  <g filter="url(#soft-shadow)">
    <rect x="270" y="132" width="152" height="104" rx="14" fill="#0b1628" stroke="#f7d575" stroke-width="1.5"/>
    <circle cx="300" cy="160" r="16" fill="url(#gold)"/>
    <text x="294" y="166" class="tag">Z</text>
    <text x="326" y="162" class="box-title">sdd-router</text>
    <text x="295" y="195" class="box-text">识别模式</text>
    <text x="295" y="218" class="box-text">风险与上下文</text>
  </g>

  <path d="M424 184 H482" class="connector"/>

  <g filter="url(#soft-shadow)">
    <rect x="498" y="132" width="148" height="104" rx="14" fill="#0b1628" stroke="#38bdf8" stroke-width="1.5"/>
    <circle cx="528" cy="160" r="16" fill="url(#blue)"/>
    <text x="523" y="166" class="tag">2</text>
    <text x="554" y="162" class="box-title">brief / PRD</text>
    <text x="523" y="195" class="box-text">目标 / 范围</text>
    <text x="523" y="218" class="box-text">验收标准</text>
  </g>

  <path d="M648 184 H706" class="connector"/>

  <g filter="url(#soft-shadow)">
    <rect x="722" y="96" width="182" height="78" rx="14" fill="#0b1628" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="752" y="130" class="box-title">完整模式</text>
    <text x="752" y="154" class="box-text">OpenSpec proposal</text>
    <text x="752" y="171" class="box-text">design / tasks</text>

    <rect x="722" y="196" width="182" height="78" rx="14" fill="#0b1628" stroke="#f7d575" stroke-width="1.5"/>
    <text x="752" y="230" class="box-title">轻量模式</text>
    <text x="752" y="254" class="box-text">task-planning</text>
    <text x="752" y="271" class="box-text">后直接实现</text>
  </g>

  <path d="M906 135 C938 135, 948 155, 974 171" class="connector"/>
  <path d="M906 235 C938 235, 948 213, 974 198" class="connector"/>

  <g filter="url(#soft-shadow)">
    <rect x="990" y="132" width="142" height="104" rx="14" fill="#0b1628" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="1020" cy="160" r="16" fill="#22d3ee"/>
    <text x="1015" y="166" class="tag">3</text>
    <text x="1044" y="162" class="box-title">verify</text>
    <text x="1014" y="195" class="box-text">测试 / Review</text>
    <text x="1014" y="218" class="box-text">对照 spec 检查</text>
  </g>

  <path d="M1062 238 C1052 303, 944 316, 810 315 H388 C262 315, 134 292, 118 242" class="loop"/>
  <text x="462" y="304" class="hint">close / handover / learn：收口、交接、经验回流，让下一次 session 接得住</text>
</svg>
